<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAP_Protocolo — Observador Híbrido</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b96;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --teal50: #E1F5EE; --teal800: #085041; --teal600: #0F6E56;
    --purple50: #EEEDFE; --purple800: #3C3489;
    --amber50: #FAEEDA; --amber800: #633806;
    --blue50: #E6F1FB; --blue800: #0C447C; --blue600: #185FA5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .container { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem; }
  .header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); }
  .header-label { font-size: 11px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-size: 26px; font-weight: 500; }
  .header-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .contract-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-family: monospace; color: var(--text3); margin-top: 10px; }
  .status-bar { border-radius: var(--radius); padding: 10px 16px; font-size: 13px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
  .s-disconnected { background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); }
  .s-connected { background: var(--teal50); color: var(--teal800); border: 0.5px solid var(--teal600); }
  .s-pending { background: var(--amber50); color: var(--amber800); }
  .s-error { background: #FCEBEB; color: #791F1F; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 1rem; }
  .metric-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 500; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
  .section-label { font-size: 11px; letter-spacing: .1em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { font-size: 12px; color: var(--text2); }
  input, textarea, select { font-family: inherit; font-size: 14px; width: 100%; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 12px; color: var(--text); outline: none; }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .btn { border-radius: var(--radius); padding: 10px 18px; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border: none; }
  .btn-dark { background: var(--text); color: var(--bg); width: 100%; justify-content: center; }
  .btn-dark:disabled { opacity: .4; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 0.5px solid var(--border2); color: var(--text2); }
  .btn-outline:disabled { opacity: .4; cursor: not-allowed; }
  .btn-connect { width: 100%; justify-content: center; margin-bottom: 1.5rem; }
  .log-list { display: flex; flex-direction: column; gap: 10px; }
  .log-entry { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .log-entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
  .log-ts { font-size: 11px; color: var(--text3); font-family: monospace; }
  .badges { display: flex; gap: 6px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .badge-chain { background: var(--teal50); color: var(--teal800); }
  .badge-local { background: var(--purple50); color: var(--purple800); }
  .badge-macro { background: var(--amber50); color: var(--amber800); }
  .badge-blue { background: var(--blue50); color: var(--blue800); }
  .log-obs { font-size: 14px; font-weight: 500; line-height: 1.5; margin-bottom: 6px; }
  .log-field { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
  .log-field span { color: var(--text3); }
  .log-valor { font-size: 12px; color: var(--teal600); background: var(--teal50); border-radius: var(--radius); padding: 6px 10px; margin-top: 8px; line-height: 1.5; }
  .log-hash { font-size: 11px; font-family: monospace; color: var(--text3); margin-top: 6px; word-break: break-all; }
  .log-hash a { color: var(--blue600); text-decoration: none; }
  .hito-card { background: var(--bg2); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px; }
  .hito-obs { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .hito-valor { font-size: 12px; color: var(--teal600); background: var(--teal50); border-radius: var(--radius); padding: 5px 10px; margin-top: 6px; }
  .hito-meta { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">Observador Híbrido Activo</div>
    <div class="header-title">TAP_Protocolo</div>
    <div class="header-sub">Dashboard de Resonancia — Sepolia Testnet</div>
    <div class="contract-pill">⬡ 0xa4C2F6c5Aa55585655e60E34573CfC594B841e8F</div>
  </div>
  <div id="status-bar" class="status-bar s-disconnected">
    <span id="status-icon">○</span>
